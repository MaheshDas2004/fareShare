{% extends "common/base.html" %}
{% block title %}Login · FareShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card card-soft">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-2">Welcome back</h1>
        <p class="text-muted mb-4">Log in to manage your group expenses and settlements.</p>

        {% if errors.login %}
          <div class="alert alert-danger">{{ errors.login }}</div>
        {% endif %}

        <form method="post" class="vstack gap-3">
          {% csrf_token %}
          <div>
            <label class="form-label">Username or email</label>
            <input class="form-control" type="text" name="username" value="{{ identifier|default:'' }}" required>
          </div>
          <div>
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <button class="btn btn-primary btn-lg">Login</button>
        </form>

        <p class="text-muted mt-3 mb-0">New here? <a href="{% url 'register' %}">Create an account</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
