{% extends "common/base.html" %}
{% block title %}Create group · FareShare{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card card-soft">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-2">Create a new group</h1>
        <p class="text-muted mb-4">Add friends, pick a currency, and start splitting.</p>

        <form method="post" class="vstack gap-3">
          {% csrf_token %}
          <div>
            <label class="form-label">Group name</label>
            <input class="form-control" type="text" name="name" value="{{ name|default:'' }}" required>
            {% if errors.name %}<div class="text-danger small mt-1">{{ errors.name }}</div>{% endif %}
          </div>
          <div>
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="4">{{ description|default:'' }}</textarea>
          </div>
          <div>
            <label class="form-label">Default currency</label>
            <input class="form-control" type="text" name="default_currency" value="{{ default_currency|default:'INR' }}" maxlength="3">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary">Create group</button>
            <a class="btn btn-outline-secondary" href="{% url 'groups:group_list' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
